<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>GO 文章系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="/static/js/api.js"></script>

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            background: #f5f6fa;
        }

        .topbar {
            height: 60px;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
        }

        .user-box {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #4f46e5;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .container {
            width: 900px;
            margin: 30px auto;
        }

        .card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        input,
        textarea {
            width: 100%;
            padding: 8px;
            margin-top: 6px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #4f46e5;
            color: #fff;
        }

        button.secondary {
            background: #888;
        }

        .article {
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .author {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="logo">GO 文章系统</div>
        <div class="user-box">
            <div class="avatar" id="userAvatar">U</div>
            <div>
                <div id="userDisplayName">未登录</div>
                <div id="userAccount" style="font-size:12px;color:#888;"></div>
            </div>
            <button onclick="showProfile()">编辑资料</button>
            <button class="secondary" onclick="logout()">退出</button>
        </div>
    </div>

    <div class="container">

        <div class="card">
            <h3>发布文章</h3>
            <input id="newTitle" placeholder="文章标题">
            <textarea id="newContent" rows="5" placeholder="文章内容"></textarea>
            <button onclick="createArticle()">发布</button>
        </div>

        <div class="card">
            <h3>全部文章</h3>
            <div id="articlesList">加载中...</div>
        </div>

    </div>

    <!-- 编辑资料弹窗 -->
    <div id="profileModal"
        style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);">
        <div style="width:400px;margin:100px auto;background:#fff;padding:20px;border-radius:10px;">
            <h3>编辑资料</h3>
            <input id="profileDisplayName" placeholder="显示名称">
            <textarea id="profileBio" rows="3" placeholder="个人简介"></textarea>
            <button onclick="saveProfile()">保存</button>
            <button class="secondary" onclick="hideProfile()">取消</button>
        </div>
    </div>

    <script>

        window.onload = async function () { if (!getToken()) { window.location.href = "/static/auth.html"; return; } await loadCurrentUser(); await loadArticles(); };

        async function loadCurrentUser() {
            const p = await apiGetMyProfile();
            if (!p || p.error) { removeToken(); window.location.href = "/static/auth.html"; return; }
            const display = p.display_name || p.username || "";
            document.getElementById("userDisplayName").innerText = display || '未登录';
            document.getElementById("userAccount").innerText = p.username || "";
            document.getElementById("userAvatar").innerText = display ? display[0].toUpperCase() : "U";
            document.getElementById("profileDisplayName").value = p.display_name || p.username || "";
            document.getElementById("profileBio").value = p.bio || "";
        }

        function showProfile() { document.getElementById("profileModal").style.display = "block"; }
        function hideProfile() { document.getElementById("profileModal").style.display = "none"; }

        async function saveProfile() {
            const name = document.getElementById("profileDisplayName").value.trim();
            const bio = document.getElementById("profileBio").value.trim();
            if (!name) { alert("显示名称不能为空"); return; }
            const r = await apiUpdateMyProfile(name, bio);
            if (!r || r.error) { alert("保存失败"); return; }
            alert("保存成功"); hideProfile(); await loadCurrentUser(); await loadArticles();
        }

        function logout() { removeToken(); window.location.href = "/static/auth.html"; }

        async function createArticle() {
            const title = document.getElementById("newTitle").value.trim();
            const content = document.getElementById("newContent").value.trim();
            if (!title || !content) { alert("标题和内容不能为空"); return; }
            const r = await apiCreateArticle(title, content, 1);
            if (!r || r.error) { alert("发布失败"); return; }
            document.getElementById("newTitle").value = ""; document.getElementById("newContent").value = ""; await loadArticles();
        }

        async function loadArticles() {
            const res = await apiListArticles(1, 20);
            if (!res || !res.items) { document.getElementById("articlesList").innerText = "加载失败"; return; }
            const list = res.items; if (list.length === 0) { document.getElementById("articlesList").innerText = "暂无文章"; return; }
            let html = "";
            list.forEach(a => {
                const id = a.id; const likeCount = a.like_count || 0;
                html += `\n        <div class="article" id="article-${id}">\n            <h4>${escapeHtml(a.title)}</h4>\n            <div class="author">作者：${escapeHtml(a.author_name)} · ${new Date(a.created_at).toLocaleString()}</div>\n            <p>${escapeHtml(a.content)}</p>\n            <div style=\"margin-top:8px;display:flex;gap:8px;align-items:center;\">\n                <button onclick=\"toggleArticleLike(${id}, this)\">❤ <span id=\"like-count-${id}\">${likeCount}</span></button>\n                <button onclick=\"toggleComments(${id})\">评论</button>\n            </div>\n            <div id=\"comments-${id}\" style=\"display:none;margin-top:10px;\">\n                <div style=\"margin-bottom:8px;\">\n                    <textarea id=\"comment-input-${id}\" rows=\"2\" placeholder=\"写评论...\" style=\"width:100%;padding:8px;border-radius:6px;border:1px solid #ddd;\"></textarea>\n                    <div style=\"text-align:right;margin-top:6px;\">\n                        <button onclick=\"postComment(${id})\">提交</button>\n                    </div>\n                </div>\n                <div id=\"comments-list-${id}\">加载中...</div>\n            </div>\n        </div>\n        `;
            });
            document.getElementById("articlesList").innerHTML = html;
        }

        function escapeHtml(s) { if (!s) return ""; return String(s).replace(/[&<>\"']/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": "&#39;" }[c]; }); }

        async function toggleArticleLike(articleId, btn) { const r = await apiToggleArticleLike(articleId); if (!r) { alert('操作失败'); return; } const countEl = document.getElementById(`like-count-${articleId}`); let count = parseInt(countEl.innerText || '0', 10); if (r.liked) { count = count + 1; btn.style.opacity = '0.8'; } else { count = Math.max(0, count - 1); btn.style.opacity = '1'; } countEl.innerText = count; }

        async function toggleComments(articleId) { const area = document.getElementById(`comments-${articleId}`); if (area.style.display === 'none' || area.style.display === '') { area.style.display = 'block'; await loadComments(articleId); } else { area.style.display = 'none'; } }

        async function loadComments(articleId) {
            const listEl = document.getElementById(`comments-list-${articleId}`);
            listEl.innerText = '加载中...'; const res = await apiListComments(articleId); if (!res) { listEl.innerText = '加载失败'; return; } if (res.length === 0) { listEl.innerText = '暂无评论'; return; }
            let html = '';
            res.forEach(c => {
                html += `<div style="padding:8px;border-radius:8px;background:#f8fafc;margin-bottom:8px;">` + `<div style="font-weight:700;">${escapeHtml(c.username)}</div>` + `<div style="color:#666;margin:6px 0;">${escapeHtml(c.content)}</div>` + `<div style="font-size:12px;color:#888;display:flex;gap:8px;align-items:center;">` + `<div>${new Date(c.created_at).toLocaleString()}</div>` + `<button onclick="toggleCommentLike(${c.id}, ${articleId})">❤ ${c.like_count || 0}</button>` + `</div>` + `</div>`;
            });
            listEl.innerHTML = html;
        }

        async function postComment(articleId) { const ta = document.getElementById(`comment-input-${articleId}`); const content = ta.value.trim(); if (!content) { alert('评论内容不能为空'); return; } const r = await apiPostComment(articleId, content); if (!r || r.error) { alert('发表评论失败'); return; } ta.value = ''; await loadComments(articleId); }

        async function toggleCommentLike(commentId, articleId) { const r = await apiToggleCommentLike(commentId); if (!r) { alert('操作失败'); return; } await loadComments(articleId); }

    </script>

</body>

</html>
