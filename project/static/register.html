<!DOCTYPE html>
<html>

<head>
    <title>注册</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="d-flex align-items-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card p-4 shadow">
                    <h3 class="text-center mb-3">用户注册</h3>

                    <input id="username" class="form-control mb-3" placeholder="用户名">
                    <input id="password" type="password" class="form-control mb-3" placeholder="密码">

                    <button class="btn btn-primary w-100" onclick="register()">注册</button>

                    <p class="text-center mt-3">
                        已有账号？
                        <a href="/static/login.html">去登录</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script>
        async function register() {
            const username = username.value;
            const password = password.value;

            const res = await apiRegister(username, password);
            alert(res.message || res.error);
        }
    </script>

</body>

</html>
